<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex h-screen">
       <div class="lg:flex lg:w-1/2 bg-gradient-to-br from-blue-600 to-blue-800 text-white p-12 flex-col justify-center">
            <h1 class="text-4xl font-bold mb-4">Welcome Back</h1>
            <p class="text-xl text-blue-100">Sign in to access your account</p>
        </div>
        <div class="w-1/2 flex justify-center p-6">
            <div class="bg-white shadow-lg rounded-lg w-full p-8 max-w-md">
                <h2 class="font-bold text-3xl text-center">Sign In</h2>
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" placeholder="EX : your@email.com"
                        class="w-full px-2 rounded-lg border hover:border-gray-500 hover:shadow-lg transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-2 rounded-lg border hover:border-gray-500 hover:shadow-lg transition-all">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Sign IN</button>
                </form>
                <p class="text-center text-gray-600 mt-4">
                    Don't have an account? <a href="#" class="text-blue-600 font-bold">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
